# Docker Compose configuration for STANS local development
# Usage: docker compose up --build
# Application: http://localhost:8080
# Health:      http://localhost:8080/health

services:
  stans:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REVISION: local
        BUILD_DATE: "unknown"
    ports:
      - "8080:80"
    # P2-C: Read-only container filesystem — prevents any process inside the
    # container from writing to the filesystem, limiting blast radius of an exploit.
    read_only: true
    # Nginx requires writable directories for its pid file, cache, and temp files.
    # We mount these as in-memory tmpfs volumes so the rest stays read-only.
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp:uid=101,gid=101
    # Drop all Linux capabilities and only add back what Nginx needs to bind port 80.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Prevent privilege escalation inside the container
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
